<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Helper Harry</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-card: #2d2d2d;
      --bg-hover: #3d3d3d;
      --text: #e0e0e0;
      --text-dim: #999;
      --accent: #4F46E5;
      --accent-light: #6366F1;
      --green: #059669;
      --amber: #D97706;
      --red: #DC2626;
      --border: #404040;
      --input-bg: #383838;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body { font-family: 'Adobe Clean', -apple-system, sans-serif; font-size: 12px; background: var(--bg); color: var(--text); overflow: hidden; }
    .panel { padding: 8px; height: 100%; overflow-y: auto; position: relative; }
    .header { display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .header-logo { font-weight: 700; font-size: 14px; color: var(--accent-light); }
    .header-user { font-size: 11px; color: var(--text-dim); }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin: 12px 0 6px; }
    .btn { padding: 6px 10px; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .btn-green { background: var(--green); color: white; }
    .btn-amber { background: var(--amber); color: white; }
    .btn-sm { padding: 3px 8px; font-size: 10px; }
    .btn-block { width: 100%; justify-content: center; }
    .input { width: 100%; padding: 6px 8px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; outline: none; }
    .input:focus { border-color: var(--accent); }
    .label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 3px; display: block; }
    .field { margin-bottom: 10px; }
    .job-card { padding: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
    .job-card:hover { border-color: var(--accent); }
    .job-card .job-number { font-weight: 700; font-size: 12px; color: var(--accent-light); }
    .job-card .job-title { font-size: 12px; margin-top: 2px; }
    .job-card .job-meta { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
    .job-card .job-specs { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-family: monospace; }
    .job-card .job-actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .asset-card { display: flex; align-items: center; gap: 6px; padding: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 4px; cursor: pointer; }
    .asset-card:hover { border-color: var(--accent); }
    .asset-card .asset-name { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .asset-card .asset-type { font-size: 9px; color: var(--accent-light); text-transform: uppercase; }
    .current-doc { padding: 8px; background: var(--bg-card); border: 1px solid var(--green); border-radius: 6px; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 600; }
    .badge-due { background: var(--amber); color: white; }
    .badge-overdue { background: var(--red); color: white; }
    .msg { padding: 8px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; }
    .msg-success { background: #0d3320; color: #6ee7b7; border: 1px solid #065f46; }
    .msg-error { background: #3b1111; color: #fca5a5; border: 1px solid #991b1b; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: var(--border); margin: 8px 0; }
    .empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 11px; }
    .settings-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; }
    .settings-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; width: 92%; max-height: 90%; overflow-y: auto; }
    .settings-panel h2 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--accent-light); }
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .settings-panel .field { margin-bottom: 8px; }
    .settings-panel .input-sm { padding: 5px 6px; font-size: 11px; }
    .settings-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--border); }
    .gear-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text-dim); font-size: 11px; font-weight: 600; padding: 3px 8px; line-height: 1; }
    .gear-btn:hover { border-color: var(--accent); color: var(--accent-light); }
  </style>
</head>
<body>
  <div id="root" class="panel"></div>
  <script src="index.js"></script>
</body>
</html>
